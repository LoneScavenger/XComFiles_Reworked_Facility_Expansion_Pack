  #  -------------------------
  # Updates for X-Com Files
  #  -------------------------
  STR_HQ_UFOPEDIA: "Штаб-квартира собирает отчёты об инопланетной активности со всего мира и распределяет задания между полевыми агентами. Также в ней находится небольшая лаборатория на 5 учёных, позволяющая проводить базовые, биохимические и разведывательные исследования. Кроме того, здесь предусмотрено размещение для 25 человек персонала и складская вместимость на 25 единиц оборудования."

  #  -------------------------
  #  Overrides for X-Com Files
  #  -------------------------
  STR_UAC_CONTACT_UFOPEDIA: "Vanguard Aero-Space Technologies — производитель передовых летательных аппаратов и авиационного оборудования. Компания также косвенно связана с BlackOps Industries через нескольких крупных инвесторов, что делает её естественным кандидатом на роль нашего поставщика. VAST проявляет большой интерес к передовым открытиям в области технологий двигательных установок. Хотя их конечные цели остаются нераскрытыми, VAST осторожно намекнула на партнёрство по созданию производственных мощностей для аэрокрафтов на базах X-Com. Правильные технологические прорывы могут привести к взаимовыгодному сотрудничеству."
  STR_HAWKEYE_UFOPEDIA: "Радиолокационный самолёт, предназначенный для дальнего разведывательного наблюдения, высокоэффективный в обнаружении скрытных операций в районах предполагаемой активности противника. Необнаруживаем."

  #  -------------------------
  #  New Added Information
  #  -------------------------
  STR_ARROW_INVESTIGATION: "Расследование CF-105 Arrow"
  STR_ARROW_INVESTIGATION_UFOPEDIA: "После того как мы начали поиск новых данных о CF-105, с нами связался член Совета, господин Михко Майестеван. Он заявил, что действует как частное лицо, а не как представитель Совета, и передал нам документацию, которая привела нас к частично заброшенной базе недалеко от Йеллоунайфа. Там мы обнаружили, как предполагаем, последний существующий Arrow. Похоже, он оснащён уникальной конфигурацией двигателя — прототипом прямоточного двигателя (ramjet), существование которого ранее считалось лишь слухом. CF-105 Arrow требует некоторой реставрации, но, по всей видимости, находится в рабочем состоянии. Возможно, мы сможем найти применение этому почтенному летательному аппарату? В конце концов, это истребитель!"
  STR_GARAGE: "Гараж"
  STR_GARAGE_UFOPEDIA: "Гаражное помещение для хранения небольших автомобилей {NEWLINE}{NEWLINE}Характеристики: {NEWLINE}{NEWLINE}> Тип ангара: 0 (Автомобили) {NEWLINE}> Вместимость техники: 1 {NEWLINE}> Мастерская: 3{NEWLINE}> Склад: 5"

  STR_HANGARX4_3X3: "Производственный комплекс VAST (Ангар x4)"
  STR_HANGARX4_3X3_UFOPEDIA: "Улучшенная версия здания ангара с аналогичными функциями, но увеличенной вместимостью до 4 летательных аппаратов. Оснащён производственной линией сборки систем VAST и инженерной командой VAST с адаптированными фирменными процессами изготовления из углеродного волокна. Требуемое пространство на базе — 3x3 блока.{NEWLINE}{NEWLINE}Характеристики: Базовая служба: > Аэромастерская <{NEWLINE}{NEWLINE}> Вместимость техники: 4{NEWLINE}> Мастерская: 50{NEWLINE}> Склад: 50"
  STR_HANGAR_CYBERAI_X3_2X2: "Антигравитационный ИИ-аэродок (Ангар x3)"
  STR_HANGAR_CYBERAI_X3_2X2_UFOPEDIA: "Этот ангарный комплекс использует инопланетные технологии, искусственный интеллект и антигравитацию, что позволяет максимально эффективно использовать пространство в многоуровневом автоматизированном подземном ангаре для хранения нескольких летательных аппаратов. Для создания и стабилизации магнитных и антигравитационных колодцев, формируемых объектом, требуются специальные материалы и источники энергии.{NEWLINE}Характеристики:{NEWLINE}{NEWLINE}> Вместимость техники: 3{NEWLINE}> Мастерская: 10{NEWLINE}> Склад: 50"
  STR_SCRAMJET: "Двигатель Scramjet"
  STR_SCRAMJET_UFOPEDIA: "Scramjet (сверхзвуковой прямоточный воздушно-реактивный двигатель) — это особый тип прямоточного двигателя, в котором сгорание топлива происходит при движении воздуха внутри двигателя со скоростью выше скорости звука. В обычном прямоточном двигателе воздух перед сгоранием замедляется до дозвуковой скорости. В отличие от ramjet, scramjet не использует ударные конусы для сжатия входящего воздуха; вместо этого воздух сжимается за счёт ударных волн внутри двигателя, которые очень быстро его замедляют. Scramjet чрезвычайно эффективен на экстремально высоких скоростях. Эта технология может быть адаптирована для создания наших собственных специализированных летательных аппаратов. С помощью VAST и их производственных процессов сборки мы теперь сможем полностью развернуть собственное производство современных самолётов."
  STR_UAC_AEROSHOP: "Производственный завод аэрокрафтов VAST"
  STR_UAC_AEROSHOP_UFOPEDIA: "VAST согласилась помочь нам построить собственный завод по производству аэрокрафтов, используя свои фирменные процессы и методы системной инженерии, при условии, что их инженеры будут работать на объекте и сотрудничать с нами во всех будущих разработках летательных аппаратов. В отношении всех совместно разработанных в будущем технологий они согласились подписать соглашение о неразглашении, чтобы сохранить конфиденциальность технологий между своей внутренней командой разработчиков и нашим агентством на эксклюзивной основе. Это позволит нам создавать современные летательные аппараты на основе технологии scramjet и других будущих инопланетных открытий."
  # STR_GENERAL_STORES_2: "Крупный складской комплекс"
  # STR_GENERAL_STORES_2_UFOPEDIA: "Этот объект значительно дороже обычного склада, однако предоставляет более структурированное складское пространство (вместимость 275 единиц){NEWLINE}{NEWLINE}> Вместимость склада: 2000"